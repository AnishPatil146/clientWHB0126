<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cleara — WhatsApp Bulk Messaging Portal</title>
    <!-- Google Fonts: Outfit (headings) & Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tabler Icons CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: {
                DEFAULT: '#1A7A4A', // Cleara green
                dark: '#115432',
                light: '#EAF6EE',
              },
              accent: {
                DEFAULT: '#0C447C', // info blue
                light: '#E6F0FA',
              }
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              outfit: ['Outfit', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      /* Custom utility styles */
      body {
        background-color: #f8fafc;
        color: #0f172a;
        font-family: 'Inter', sans-serif;
      }
      
      .font-outfit {
        font-family: 'Outfit', sans-serif;
      }

      /* Laser Scan Animation */
      @keyframes scan {
        0% { top: 0%; opacity: 0.8; }
        50% { top: 100%; opacity: 0.8; }
        100% { top: 0%; opacity: 0.8; }
      }
      
      .laser-line {
        position: absolute;
        left: 0;
        width: 100%;
        height: 3px;
        background: #1A7A4A;
        box-shadow: 0 0 10px #1A7A4A, 0 0 20px #1A7A4A;
        animation: scan 3s linear infinite;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.02);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.15);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 0, 0, 0.25);
      }

      /* Pulse animations */
      .pulse-green {
        animation: pulse-green-anim 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes pulse-green-anim {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: .6; transform: scale(1.05); }
      }

      /* Dark mode custom background variables */
      :root {
        --bg-panel: #ffffff;
        --bg-body: #f8fafc;
        --border-color: rgba(226, 232, 240, 0.8);
        --text-color: #0f172a;
        --text-muted: #64748b;
        --bg-card: #f8fafc;
      }
      .dark {
        --bg-panel: #0b1329;
        --bg-body: #030712;
        --border-color: rgba(255, 255, 255, 0.08);
        --text-color: #f3f4f6;
        --text-muted: #9ca3af;
        --bg-card: #111827;
      }
      
      body.dark-theme {
        background-color: var(--bg-body);
        color: var(--text-color);
      }
      .dark-card {
        background-color: var(--bg-panel);
        border-color: var(--border-color);
      }
      .dark-input {
        background-color: var(--bg-card);
        border-color: var(--border-color);
        color: var(--text-color);
      }
    </style>
  </head>
  <body class="dark-theme">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
